<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f6f2e9" />
    <title>共有成績 | Mahjong Ledger</title>
    <link rel="manifest" href="./manifest.json" />
    <link rel="apple-touch-icon" href="./icon.svg" />
    <link rel="stylesheet" href="./share.css?v=17" />
  </head>
  <body>
    <div class="share-shell">
      <header class="share-topbar">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true">東</span>
          <div>
            <p class="eyebrow">Read Only</p>
            <h1>共有成績</h1>
          </div>
        </div>
        <div class="topbar-actions">
          <a class="button subtle" href="./index.html?v=17">本体へ</a>
          <button class="button" id="csvButton" type="button">CSV出力</button>
          <button class="button" id="importButton" type="button">JSON読込</button>
          <input id="importFile" type="file" accept="application/json,.json" hidden />
        </div>
      </header>

      <main class="share-workspace">
        <section class="status-band" aria-label="共有データ">
          <div>
            <p class="eyebrow">Source</p>
            <strong id="sourceLabel">ローカル保存</strong>
          </div>
          <span id="sourceDetail">保存済みデータを確認中</span>
        </section>

        <section class="summary-grid" id="summaryGrid" aria-label="リーグ概要"></section>

        <section class="standings-section" aria-labelledby="standingsHeading">
          <div class="section-title">
            <div>
              <p class="eyebrow">Standings</p>
              <h2 id="standingsHeading">総合順位</h2>
            </div>
            <div class="scope-tabs" role="tablist" aria-label="成績表示">
              <button type="button" data-scope="overall" aria-pressed="true">総合</button>
              <button type="button" data-scope="today" aria-pressed="false">当日</button>
              <button type="button" data-scope="daily" aria-pressed="false">日別</button>
            </div>
          </div>
          <div class="standings-table" id="standingsTable"></div>
          <div class="trend-chart" id="trendChart"></div>
        </section>

        <section class="matches-section" aria-labelledby="matchesHeading">
          <div class="section-title">
            <div>
              <p class="eyebrow">Matches</p>
              <h2 id="matchesHeading">半荘一覧</h2>
            </div>
          </div>
          <div class="match-list" id="matchList"></div>
        </section>
      </main>
    </div>

    <script src="./share.js?v=17" defer></script>
  </body>
</html>
