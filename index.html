<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f7f3ea" />
    <title>Mahjong Ledger</title>
    <link rel="manifest" href="./manifest.json" />
    <link rel="apple-touch-icon" href="./icon.svg" />
    <link rel="stylesheet" href="./styles.css?v=17" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true">東</span>
          <div>
            <p class="eyebrow">対局計測</p>
            <h1>Mahjong Ledger</h1>
          </div>
        </div>
        <div class="topbar-actions">
          <button class="button subtle" id="shareLinkButton" type="button">共有リンク</button>
          <button class="icon-button" id="themeToggle" type="button" aria-label="表示切替" title="表示切替">
            ◐
          </button>
          <button class="icon-button" id="csvButton" type="button" aria-label="シートCSV書き出し" title="シートCSV書き出し">
            CSV
          </button>
          <button class="icon-button" id="exportButton" type="button" aria-label="書き出し" title="書き出し">
            ⇩
          </button>
          <button class="icon-button" id="importButton" type="button" aria-label="JSON読込" title="JSON読込">
            ⇧
          </button>
          <input id="importFile" type="file" accept="application/json,.json" hidden />
          <button class="button danger" id="resetButton" type="button">新規対局</button>
        </div>
      </header>

      <main class="workspace">
        <section class="score-section" aria-labelledby="scoreHeading">
          <div class="section-title">
            <div>
              <p class="eyebrow">Scoreboard</p>
              <h2 id="scoreHeading">順位と点数</h2>
            </div>
            <div class="round-toolbar" aria-label="局情報">
              <button class="icon-button" type="button" data-action="round-step" data-value="-1" aria-label="前の局" title="前の局">
                ←
              </button>
              <div class="round-pill">
                <span id="roundLabel">東1局</span>
                <small id="roundSubLabel">0本場 / 供託0</small>
              </div>
              <button class="icon-button" type="button" data-action="round-step" data-value="1" aria-label="次の局" title="次の局">
                →
              </button>
            </div>
          </div>

          <div class="round-adjusters">
            <div class="stepper">
              <span>本場</span>
              <button type="button" data-action="honba-step" data-value="-1" aria-label="本場を減らす">−</button>
              <strong id="honbaValue">0</strong>
              <button type="button" data-action="honba-step" data-value="1" aria-label="本場を増やす">＋</button>
            </div>
            <div class="stepper">
              <span>供託</span>
              <button type="button" data-action="stick-step" data-value="-1" aria-label="供託を減らす">−</button>
              <strong id="stickValue">0</strong>
              <button type="button" data-action="stick-step" data-value="1" aria-label="供託を増やす">＋</button>
            </div>
            <button class="button subtle" id="undoButton" type="button">1局戻す</button>
          </div>

          <div class="players-grid" id="playersGrid"></div>
        </section>

        <section class="recorder-section" aria-labelledby="recorderHeading">
          <div class="section-title compact">
            <div>
              <p class="eyebrow">Hand Log</p>
              <h2 id="recorderHeading">局入力</h2>
            </div>
            <span class="hand-count" id="handCount">0局</span>
          </div>

          <div class="mode-tabs" role="group" aria-label="結果">
            <button type="button" data-action="set-result" data-result="ron">ロン</button>
            <button type="button" data-action="set-result" data-result="tsumo">ツモ</button>
            <button type="button" data-action="set-result" data-result="draw">流局</button>
          </div>

          <div class="selector-grid">
            <label>
              和了者
              <select id="winnerSelect"></select>
            </label>
            <label>
              放銃者
              <select id="loserSelect"></select>
            </label>
          </div>

          <div class="action-grid" id="actionGrid" aria-label="行動"></div>
          <div class="score-control-bar">
            <div class="score-input-tabs" role="group" aria-label="点数入力">
              <button type="button" data-action="set-score-mode" data-score-mode="adjust">微調整</button>
              <button type="button" data-action="set-score-mode" data-score-mode="preset">定番</button>
            </div>
          </div>
          <div class="delta-grid" id="deltaGrid" aria-label="点数差"></div>
          <div class="chip-grid" id="chipGrid" aria-label="チップ差"></div>

          <div class="memo-row">
            <label>
              メモ
              <input id="memoInput" type="text" maxlength="80" autocomplete="off" placeholder="例: 満貫 / 親流れ" />
            </label>
          </div>

          <div class="recorder-footer">
            <label class="checkbox-line">
              <input id="advanceRound" type="checkbox" checked />
              局を進める
            </label>
            <button class="button primary" id="saveHandButton" type="button">局を確定</button>
          </div>
        </section>

        <section class="history-section" aria-labelledby="historyHeading">
          <div class="section-title compact">
            <div>
              <p class="eyebrow">Timeline</p>
              <h2 id="historyHeading">履歴</h2>
            </div>
            <button class="button subtle" id="finishMatchButton" type="button">半荘保存</button>
          </div>
          <div class="history-list" id="historyList"></div>
        </section>

        <section class="summary-section" aria-labelledby="summaryHeading">
          <div class="section-title compact">
            <div>
              <p class="eyebrow">Archive</p>
              <h2 id="summaryHeading">総合成績</h2>
            </div>
            <div class="archive-scope-tabs" role="tablist" aria-label="成績表示">
              <button type="button" data-archive-scope="overall" aria-pressed="true">総合</button>
              <button type="button" data-archive-scope="today" aria-pressed="false">当日</button>
              <button type="button" data-archive-scope="daily" aria-pressed="false">日別</button>
            </div>
          </div>
          <div class="summary-stats" id="summaryStats"></div>
          <div class="trend-chart" id="trendChart"></div>
          <div class="match-list" id="matchList"></div>
        </section>

        <section class="settings-section" aria-labelledby="settingsHeading">
          <div class="section-title compact">
            <div>
              <p class="eyebrow">Rules</p>
              <h2 id="settingsHeading">設定</h2>
            </div>
          </div>
          <div class="settings-grid" id="settingsGrid"></div>
          <div class="danger-zone" id="dangerZone"></div>
        </section>
      </main>
    </div>

    <script src="./app.js?v=17" defer></script>
  </body>
</html>
